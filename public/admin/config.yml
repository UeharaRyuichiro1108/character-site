backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "characters"
    label: "キャラクター"
    folder: "src/content/characters"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "名前", name: "name", widget: "string" }
      - { label: "性別", name: "gender", widget: "string", required: false }
      - { label: "身長", name: "height", widget: "string", required: false }
      - { label: "年齢", name: "age", widget: "string", required: false }
      - { label: "役職", name: "role", widget: "string", required: false }
      - { label: "動物", name: "animal", widget: "string", required: false }
      - { label: "性格", name: "personality", widget: "text", required: false }
      - { label: "特技", name: "skill", widget: "text", required: false }
      - { label: "能力", name: "ability", widget: "text", required: false }
      - { label: "生い立ち", name: "background", widget: "text", required: false }
      - { label: "その他", name: "other", widget: "text", required: false }
      - { label: "所属博物館名", name: "group", widget: "string" }
      - { label: "所属博物館ID", name: "museumId", widget: "string", required: false }
      - { label: "トップ画像", name: "image", widget: "image" }
      - { label: "Musetter用アイコン", name: "musetterIcon", widget: "image", required: false, hint: "未設定の場合はトップ画像が使われます。" }
      - { label: "デザイン画", name: "designImage", widget: "image", required: false }
      - { label: "キャッチコピー", name: "catchcopy", widget: "string", required: false }
      - { label: "関係キャラクターID", name: "relatedCharacterIds", widget: "list", required: false }
      - label: "相関図の関係文言"
        name: "relationships"
        widget: "list"
        required: false
        fields:
          - { label: "相手キャラクターID", name: "targetId", widget: "string" }
          - { label: "このキャラから相手への文言", name: "text", widget: "string", required: false }
      - { label: "タグ", name: "tags", widget: "list", required: false }
      - { label: "自由説明", name: "body", widget: "markdown", required: false }

  - name: "museums"
    label: "博物館"
    folder: "src/content/museums"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "名前", name: "name", widget: "string" }
      - { label: "短い説明", name: "summary", widget: "string" }
      - { label: "Musetter用アイコン", name: "musetterIcon", widget: "image", required: false, hint: "未設定の場合はロゴが使われます。" }
      - { label: "関係博物館ID", name: "relatedMuseumIds", widget: "list", required: false }
      - label: "相関図の関係文言"
        name: "museumRelationships"
        widget: "list"
        required: false
        fields:
          - { label: "相手博物館ID", name: "targetId", widget: "string" }
          - { label: "この博物館から相手への文言", name: "text", widget: "string", required: false }
      - { label: "本文", name: "body", widget: "markdown" }

  - name: "illustrations"
    label: "イラスト"
    folder: "src/content/illustrations"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "一覧用静止画", name: "image", widget: "image" }
      - { label: "画像・動画セット", name: "images", widget: "list", required: false, max: 10, field: { label: "画像/GIF/MP4", name: "image", widget: "image" } }
      - { label: "XのポストURL", name: "postUrl", widget: "string", required: false }
      - { label: "関連タグ", name: "tags", widget: "list", required: false }
      - { label: "説明", name: "body", widget: "markdown", required: false }

  - name: "gifted-illustrations"
    label: "描いていただいたイラスト"
    folder: "src/content/gifted-illustrations"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "製作者名", name: "creatorName", widget: "string" }
      - { label: "Xの投稿URL", name: "url", widget: "string" }
      - { label: "サムネイル画像URL", name: "thumbnailUrl", widget: "string", required: false }
  - name: "novels"
    label: "小説"
    folder: "src/content/novels"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "登場キャラクターID", name: "characterIds", widget: "list", required: false }
      - { label: "関連博物館ID", name: "museumIds", widget: "list", required: false }
      - { label: "本文", name: "body", widget: "markdown", required: false }
  - name: "columns"
    label: "博物館館報"
    folder: "src/content/columns"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "概要", name: "summary", widget: "text", required: false }
      - { label: "作成日", name: "createdAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "編集日", name: "updatedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "関連キャラクターID", name: "characterIds", widget: "list", required: false }
      - { label: "関連博物館ID", name: "museumIds", widget: "list", required: false }
      - { label: "本文", name: "body", widget: "markdown", required: false }
  - name: "ads"
    label: "幻覚広告"
    folder: "src/content/ads"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "掲載年月日", name: "publishedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "バナー画像", name: "bannerImage", widget: "image" }
      - { label: "本文", name: "body", widget: "markdown", required: false }
  - name: "news"
    label: "お知らせ"
    folder: "src/content/news"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "掲載年月日", name: "publishedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "同じ日付内の表示順", name: "order", widget: "number", required: false, value_type: "int", min: 1, hint: "同じ掲載年月日の中で、1が一番下、2がその上に表示されます。数字が大きいほど上に並びます。未入力の場合は後ろに並びます。" }
      - { label: "本文", name: "body", widget: "markdown", required: false }
  - name: "musetter"
    label: "Musetter"
    folder: "src/content/musetter"
    create: true
    slug: "{{fields.id}}"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "投稿者種別", name: "authorType", widget: "select", options: ["character", "museum"], hint: "キャラクターなら character、博物館なら museum" }
      - { label: "投稿者ID", name: "authorId", widget: "string", hint: "例: tasuku / sion / aidate / yubari" }
      - { label: "投稿日時", name: "publishedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: "返信先投稿ID", name: "replyTo", widget: "string", required: false, hint: "返信にしたい場合だけ、元投稿のIDを書く" }
      - { label: "添付画像", name: "images", widget: "list", required: false, max: 4, field: { label: "画像", name: "image", widget: "image" } }
      - { label: "本文", name: "body", widget: "markdown", required: false }
  - name: "pages"
    label: "固定ページ"
    files:
      - name: "world"
        label: "世界観"
        file: "src/content/pages/world.md"
        fields:
          - { label: "タイトル", name: "title", widget: "string" }
          - { label: "本文", name: "body", widget: "markdown" }







